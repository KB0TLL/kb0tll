services:
  - type: web
    name: kb0tll-api
    runtime: python
    rootDir: backend
    buildCommand: pip install poetry && poetry install --no-root
    startCommand: poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
